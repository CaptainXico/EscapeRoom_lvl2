<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room: Medical Mystery</title>
    <meta name="description" content="Solve the puzzles to escape the mysterious graveyard">
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="audio-unlock.js"></script>
    <script src="movement.js"></script>
    <script src="overlay.js"></script>
    <script src="VRoverlay.js"></script>
    <script src="escape-room-game.js"></script>
    <script src="VRnotification.js"></script>
    <script src="mobile.js"></script>
  </head>
  <body>
    
    <a-scene fog="type: linear; color: #000000; near: 1; far: 8">
      <audio id="ambient-sound" src="blueroom.mp3" preload="auto"></audio>

      <a-assets>
        <a-asset-item id="defi" src="defibrillator_low_poly.glb"></a-asset-item>
        <a-asset-item id="grave" src="obelisk.glb"></a-asset-item>
        <a-asset-item id="note" src="book.glb"></a-asset-item>
        <a-asset-item id="fire" src="fire_extinguisher.glb"></a-asset-item>
        <a-asset-item id="key" src="key.glb"></a-asset-item>
        <a-asset-item id="bookshelf" src="low_poly_bookshelf.glb"></a-asset-item>
        <a-asset-item id="crate" src="wooden_crate.glb"></a-asset-item>
      </a-assets>

<a-entity
        sound="src: #ambient-sound;
        autoplay: true;
        loop: true;
        volume: 0.5;
        positional: false">
      </a-entity>
      
      <!-- NON Interactives -->
      <a-entity id="crate1"
        gltf-model="#crate"
        position="4.24 0.6 -1"
        rotation="90 0 0"
        scale="5 5 5"
      ></a-entity>

      <a-entity id="crate2"
        gltf-model="#crate"
        position="2.84 0.95 -3.33"
        rotation="90 0 0"
        scale="8 8 8"
      ></a-entity>

      <a-entity id="crate3"
        gltf-model="#crate"
        position="3.55 2.51 -3.97"
        rotation="90 20 0"
        scale="5 5 5"
      ></a-entity>

      <a-entity id="crate4"
        gltf-model="#crate"
        position="4.1 0.6 -2.38"
        rotation="90 -10 0"
        scale="5 5 5"
      ></a-entity>

      <a-entity
        id="fire"
        gltf-model="#fire"
        scale="0.2 0.2 0.2"
        position="1.4 1.3 4.85"
        rotation="0 90 0"
      ></a-entity>
      
      <!-- Interactive Tree with hidden symbol -->
      <a-entity
        id="key"
        gltf-model="#key"
        position="3.9 1.1 -0.85"
        rotation="0 -120 0"
        scale="0.1 0.1 0.1"
        class="interactive"
        puzzle-piece
        data-symbol="🌙"
        data-found="false">
      </a-entity>

      <!-- Floating crystal with symbol -->
      <a-entity id="bookshelf"
        gltf-model="#bookshelf"
        position="-4.54 0.964 3"
        rotation="0 90 0"
        scale="3 3 3"
        class="interactive" 
        puzzle-piece 
        data-symbol="⭐" 
        data-found="false">
      </a-entity>

      <a-entity
        id="defi"
        gltf-model="#defi"
        scale="2 2 2"
        position="-4.84 1.3 -0.2"
        rotation="0 90 0"
        class="interactive" 
        puzzle-piece 
        data-symbol="🔥" 
        data-found="false"
      ></a-entity>

      <!-- Interactive Note with riddle -->
      <a-entity
        gltf-model="#note"
        position="-4.7 0.56 2.71"
        rotation="0 90 0"
        scale="1 1 1"
        class="interactive"
        note-puzzle>
      </a-entity>
      
      <!-- Interactive Gravestone with puzzle input -->
      <a-entity
        gltf-model="#grave"
        position="-2 0 -3"
        rotation="0 0 0"
        scale="4 4 4"
        class="interactive"
        gravestone-puzzle>
        <!-- Symbol display on gravestone -->
        <a-text id="gravestone-display" value="___" position="0 2 0.5" rotation="0 0 0" align="center" color="#00ff00" scale="1 1 1"></a-text>
      </a-entity>

      <!-- Room Boundaries -->
      <!-- Back Wall -->
      <a-plane position="0 2.5 -5" rotation="0 0 0" width="10" height="5" color="#2a2a2a" material="roughness: 0.8"></a-plane>
      
      <!-- Left Wall -->
      <a-plane position="-5 2.5 0" rotation="0 90 0" width="10" height="5" color="#2a2a2a" material="roughness: 0.8"></a-plane>
      
      <!-- Right Wall -->
      <a-plane position="5 2.5 0" rotation="0 -90 0" width="10" height="5" color="#2a2a2a" material="roughness: 0.8"></a-plane>
      
      <!-- Front Wall with Door -->
      <a-plane position="0 2.5 5" rotation="0 180 0" width="4" height="5" color="#2a2a2a" material="roughness: 0.8"></a-plane>
      <a-plane position="-3 2.5 5" rotation="0 180 0" width="2" height="5" color="#2a2a2a" material="roughness: 0.8"></a-plane>
      <a-plane position="3 2.5 5" rotation="0 180 0" width="2" height="5" color="#2a2a2a" material="roughness: 0.8"></a-plane>
      
      <!-- Exit Door (initially locked) -->
      <a-box id="exit-door" position="0 2 4.95" width="2" height="4" depth="0.1" color="#4a0e0e" class="interactive" escape-door>
        <a-text value="LOCKED" position="0 0 -0.05" rotation="180 0 180" align="center" color="#ff0000" scale="0.5 0.5 0.5"></a-text>
      </a-box>

      <!-- Floor -->
      <a-plane 
        position="0 0 0" 
        rotation="-90 0 0" 
        width="10" 
        height="10" 
        color="#1a1a1a" 
        material="opacity: 0.9; roughness: 1"
      ></a-plane>

      <!-- Ceiling -->
      <a-plane 
        position="0 5 0" 
        rotation="90 0 0" 
        width="10" 
        height="10" 
        color="#0a0a0a" 
        material="roughness: 0.9"
      ></a-plane>


      <!-- Camera rig with controllers as children -->
      <a-entity id="camera-rig" player-jump>
        <a-camera id="camera" position="0 1.6 0" look-controls="pointerLockEnabled: true">
          <a-cursor id="desktop-cursor" rayOrigin="mouse" raycaster="objects: .interactive, button, [class*='close-btn']" visible="true" color="white"></a-cursor>
        </a-camera>

        <!-- Left controller -->
        <a-entity
          id="left-controller"
          laser-controls="hand: left"
          raycaster="objects: .interactive; far: 10"
          line="color: #00ff00; opacity: 0.8;"
           cursor="rayOrigin: entity"
          thumbstick-audio
          smooth-locomotion
        ></a-entity>

        <!-- Right controller -->
        <a-entity
          id="right-controller"
          laser-controls="hand: right"
          raycaster="objects: .interactive; far: 10"
          line="color: #00ff00; opacity: 0.8;"
          cursor="rayOrigin: entity"
          vr-smooth-turn
          thumbstick-audio
        ></a-entity>
      </a-entity>

      <!-- LIGHTS -->
    <a-light type="ambient" intensity="0.2" color="#1a1a2e"></a-light>
    <a-light id="center" type="ambient" position="0 4 2" intensity="1" color="#ffa500">
      <a-animation attribute="intensity" values="0.8;1.2;0.8" dur="3000" repeat="indefinite"></a-animation>
    </a-light>
    <a-light id="blue" type="point" position="-3 2 -3" intensity="2" color="#00ffff"></a-light>
    <a-light id="pink" type="point" position="3 2 3" intensity="1" color="#ff00ff"></a-light>
    
    
    </a-scene>
  </body>
</html>
